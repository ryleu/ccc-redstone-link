modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
description='''
${mod_description}
'''

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="${neo_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="create"
type="required"
versionRange="${create_version_range}"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="computercraft"
type="required"
versionRange="${cc_tweaked_version_range}"
ordering="AFTER"
side="BOTH"

# Sable is an optional integration dep — we only use it to translate block
# positions out of Sable sub-levels (contraptions) and into world space so
# Create's redstone-link range checks work across the sub-level boundary.
[[dependencies.${mod_id}]]
modId="sable"
type="optional"
versionRange="${sable_version_range}"
ordering="AFTER"
side="BOTH"
